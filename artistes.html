<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="./artistes.css">
    <title>Artiste - Arfest</title>
</head>
<body class="artist-body">
    <main class="artist-main"> 
        
        <a href="index.html" class="back-btn">
            <img src="./img/Arrow.png" alt="Retour à l'accueil">
        </a>

        <div class="image-wrapper">
            <img id="artist-img" src="./img/artistes/" alt="Portrait de l'artiste">
            <div class="fade-bottom"></div> </div>

        <div class="artist-info">
            <h1 id="artist-name">Nom de l'artiste</h1>
            <p id="artist-description">Description de l'artiste</p>
        </div>

        <div class="artist-socials">
            <h2>Réseaux</h2>
            <div class="social-links">
                <a id="artist-insta" href="#" target="_blank"><img src="./img/insta.png" alt="Instagram"></a>
                <a id="artist-spotify" href="#" target="_blank"><img src="./img/spotify.png" alt="Spotify"></a>
            </div>
        </div>

        <img class="watermark-logo" src="./img/LOGO_ARFEST 2.png" alt="Logo Arfest">
        
    </main>
    
    <script src="./script.js"></script>
</body>
</html>
